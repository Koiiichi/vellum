<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vellum</title>
  {{LOGO_DARK_STYLE}}
</head>
<body style="margin:0; padding:0; background-color:#ffffff; color:#111111; font-family:'Space Grotesk', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px; max-width:600px;">

          <tr>
            <td style="padding:8px 8px 24px 8px;">
              {{LOGO}}
            </td>
          </tr>

          <tr>
            <td style="padding:0 8px 8px 8px; font-size:18px; font-weight:500; color:#111111;">
              {{ERROR_HEADLINE}}
            </td>
          </tr>
          <tr>
            <td style="padding:0 8px 16px 8px; font-size:15px; line-height:1.55; color:#111111;">
              {{ERROR_BODY}}
            </td>
          </tr>

          <tr>
            <td style="padding:0 8px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#e8e5df; border-radius:8px;">
                <tr><td style="padding:20px 24px; font-size:14px; line-height:1.5; color:#111111;">
                  {{ERROR_DETAIL}}
                </td></tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:32px 8px 8px 8px; border-top:1px solid #e8e5df;"></td>
          </tr>
          <tr>
            <td style="padding:8px; font-size:12px; color:#6b7280;">
              Powered by Vellum &middot; github.com/Koiiichi/vellum
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
